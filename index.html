<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evelyn's Morning Desk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene">

    <div class="wall-note left-note">
      You’ve<br>got this,<br>Evelyn. 💗
    </div>

    <div class="wall-note right-note">
      ♡<br>It’s okay<br>to have a<br>slow day.
    </div>

    <h1>Evelyn’s Morning Desk 🌸</h1>
    <p class="subtitle">Pick one when you need a little reminder.</p>
    <div class="heart">💗</div>

    <section class="message-card" id="messageCard">
      <button id="closeMessage" class="close">×</button>
      <div id="messageIcon" class="big-icon">☁️</div>
      <h2 id="messageTitle">Welcome</h2>
      <p id="messageText">Pick one drawer below whenever you need a little light.</p>
    </section>

    <div class="shelf-label">🌿 Pick one for yourself 🌿</div>

    <section class="drawer-row">
      <button class="drawer courage" data-category="courage">
        <span class="icon">💗</span>
        <span>Courage</span>
      </button>

      <button class="drawer joy" data-category="joy">
        <span class="icon">⭐</span>
        <span>Joy</span>
      </button>

      <button class="drawer luck" data-category="luck">
        <span class="icon">🍀</span>
        <span>Luck</span>
      </button>

      <button class="drawer calm" data-category="calm">
        <span class="icon">☁️</span>
        <span>Calm</span>
      </button>

      <button class="drawer focus" data-category="focus">
        <span class="icon">🌸</span>
        <span>Focus</span>
      </button>
    </section>

    <div class="bottom-area">
      <div class="tiny-card">You are enough,<br>exactly as you are. 💗</div>

      <button id="emergencyBtn" class="emergency">
        🚨 Emergency Drawer
        <small>Use only when necessary</small>
      </button>
    </div>

    <footer>
      Made with 💗 for Evelyn
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
